name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Baixar o código do repositório (Checkout)
      uses: actions/checkout@v4

    - name: ⚙️ Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: 📦 Instalar dependências do projeto
      run: npm ci

    - name: 🌐 Instalar navegadores do Playwright e dependências do Linux
      run: npx playwright install --with-deps chromium

    # 👇 ADICIONE ESTE NOVO PASSO AQUI 👇
    - name: 🧩 Gerar arquivos de teste do BDD
      run: npx bddgen

    - name: 🎭 Executar os testes (Playwright + BDD)
      run: npx playwright test

    - name: 📊 Salvar o Relatório HTML (Artifacts)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30