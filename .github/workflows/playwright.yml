name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Baixar o código do repositório (Checkout)
      uses: actions/checkout@v4

    - name: ⚙️ Configurar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: 📦 Instalar dependências do projeto
      run: npm ci

    - name: 🌐 Instalar navegadores do Playwright e dependências do Linux
      run: npx playwright install --with-deps chromium

    - name: 🧩 Gerar arquivos de teste do BDD
      run: npx bddgen

    - name: 🎭 Executar os testes (Playwright + BDD)
      run: npx playwright test

    - name: 📈 Enviar métricas para o Banco de Dados (Para o Grafana)
      if: always()
      env:
        INFLUX_URL: ${{ secrets.INFLUX_URL }}
        INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
        INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
        COMMIT_HASH: ${{ github.sha }}
        BRANCH_NAME: ${{ github.ref_name }}
      run: node scripts/send-metrics.js

    - name: 📊 Salvar o Relatório HTML (Artifacts)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: 🚀 Publicar Relatório no GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
        keep_files: true